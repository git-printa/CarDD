services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-car_damage}"
      POSTGRES_USER: "${POSTGRES_USER:-car_damage}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-car_damage}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - car-damage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-car_damage} -d ${POSTGRES_DB:-car_damage}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: car-damage-ai/ai-service:local
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      INFERENCE_MODE: "${INFERENCE_MODE:-yolo}"
      MODEL_PATH: "${MODEL_PATH:-/weights/yolo26x.pt}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    volumes:
      - ./model-training/pretrained/yolo26x.pt:/weights/yolo26x.pt:ro
      - ./model-training:/workspace/model-training
      - ./ai-service/docker-weights:/docker-weights
    networks:
      - car-damage-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - car-damage-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: car-damage-ai/backend:local
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      UPLOAD_DIR: "/data/uploads"
      TRAIN_MODEL_PATH: "/workspace/model-training/cache/base-weights/yolov8m.pt"
      TRAIN_EPOCHS: "30"
      TRAIN_IMGSZ: "640"
      TRAIN_PROJECT: "/workspace/model-training/runs"
      TRAIN_RUN_NAME: "cardd_6class"
      TRAIN_PATIENCE: "15"
      TRAIN_DEPLOY_PATH: "/docker-weights/car_damage_best.pt"
      AI_SERVICE_URL: "${AI_SERVICE_URL:-http://ai-service:8000}"
      DB_URL: "${DB_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-car_damage}}"
      DB_USER: "${DB_USER:-${POSTGRES_USER:-car_damage}}"
      DB_PASS: "${DB_PASS:-${POSTGRES_PASSWORD:-car_damage}}"
      DB_DRIVER: "${DB_DRIVER:-org.postgresql.Driver}"
      CHAT_MODE: "${CHAT_MODE:-assistant_full}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1}"
      ALLOW_GENERIC_YOLO_DAMAGE_HEURISTIC: "${ALLOW_GENERIC_YOLO_DAMAGE_HEURISTIC:-false}"
    volumes:
      - ./data/uploads:/data/uploads
    networks:
      - car-damage-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: car-damage-ai/frontend:local
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - car-damage-net
    restart: unless-stopped

networks:
  car-damage-net:
    name: car-damage-net
    driver: bridge

volumes:
  postgres-data:
  ollama-data:
