# Optional: mount weights without rebuilding the image.
# Usage from repo root:
#   docker compose -f docker-compose.yml -f docker-compose.model-weights.example.yml up -d ai-service
#
# Trained car damage (scratch/dent/crack): keep MODEL_PATH=/weights/car_damage_best.pt and fix the host path.
#
# YOLO26x detect base (COCO classes — good for testing the stack; copy yolo26x.pt to model-training/pretrained/ first):
#   docker compose -f docker-compose.yml -f docker-compose.model-weights.example.yml -f docker-compose.yolo26x-base.example.yml up -d ai-service

services:
  ai-service:
    environment:
      INFERENCE_MODE: yolo
      MODEL_PATH: /weights/car_damage_best.pt
    volumes:
      - ./model-training/runs/car_damage/weights/best.pt:/weights/car_damage_best.pt:ro
